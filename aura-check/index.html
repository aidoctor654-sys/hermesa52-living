<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0612" />
  <meta name="description" content="Discover the color of your aura. Mystical aura scanner for entertainment purposes only." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Aura Scanner" />

  <title>Aura Scanner — Reveal Your Energy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Star field background -->
  <div class="cosmos" aria-hidden="true">
    <div class="stars"></div>
    <div class="stars stars-2"></div>
    <div class="stars stars-3"></div>
    <div class="nebula"></div>
  </div>

  <main id="app">
    <!-- INTRO SCREEN -->
    <section class="screen screen-intro active" id="screen-intro" aria-label="Welcome">
      <div class="screen-inner">
        <h1 class="title">
          <span class="title-aura">Aura</span>
          <span class="title-scanner">Scanner</span>
        </h1>
        <p class="tagline">Reveal the color of your energy</p>

        <div class="orb-preview" aria-hidden="true">
          <div class="orb-glow"></div>
          <div class="orb-core"></div>
        </div>

        <button class="btn btn-primary" id="btn-start" type="button">
          <span class="btn-glyph">✦</span>
          <span>Begin Reading</span>
        </button>

        <p class="disclaimer">For entertainment purposes only.</p>
      </div>
    </section>

    <!-- SCAN SCREEN -->
    <section class="screen screen-scan" id="screen-scan" aria-label="Scanning">
      <div class="camera-wrap">
        <video id="camera" autoplay playsinline muted></video>
        <div class="camera-fallback" id="camera-fallback">
          <div class="fallback-orb"></div>
          <p>Camera not available</p>
        </div>
      </div>

      <div class="scan-overlay" aria-hidden="true">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div class="reticle">
          <span class="reticle-dot"></span>
        </div>
        <div class="scan-line"></div>
        <div class="particles" id="particles"></div>
      </div>

      <div class="scan-content">
        <p class="scan-status" id="scan-status">Align yourself with the light…</p>
        <div class="progress">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>
    </section>

    <!-- RESULT SCREEN -->
    <section class="screen screen-result" id="screen-result" aria-label="Your aura">
      <div class="screen-inner">
        <p class="result-eyebrow">Your aura reveals…</p>
        <h2 class="result-title" id="result-title">You have a Violet Aura</h2>

        <div class="result-orb" id="result-orb">
          <div class="result-orb-glow"></div>
          <div class="result-orb-core"></div>
          <div class="result-orb-ring"></div>
        </div>

        <div class="result-card" id="result-card">
          <p class="result-color-name" id="result-color-name">Violet</p>
          <p class="result-reading" id="result-reading"></p>
        </div>

        <div class="result-actions">
          <button class="btn btn-primary" id="btn-share" type="button">
            <span class="btn-glyph">↗</span>
            <span>Share My Aura</span>
          </button>
          <button class="btn btn-ghost" id="btn-again" type="button">
            <span>Scan Again</span>
          </button>
        </div>

        <p class="disclaimer">For entertainment purposes only.</p>
      </div>
    </section>
  </main>

  <!-- Share canvas (offscreen) -->
  <canvas id="share-canvas" width="1080" height="1080" aria-hidden="true"></canvas>

  <script src="js/aura-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
